name: Live Proton Regression

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  workflow_dispatch:
    inputs:
      allow_fresh_login:
        description: "Allow credential login if PROTONMAIL_SESSION_JSON is missing or expired"
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "17 5 * * *"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: live-proton-regression-${{ github.event.pull_request.head.ref || github.ref_name }}
  cancel-in-progress: false

jobs:
  login:
    name: Proton login and session reuse
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PROTONMAIL_USERNAME: ${{ secrets.PROTONMAIL_USERNAME }}
      PROTONMAIL_PASSWORD: ${{ secrets.PROTONMAIL_PASSWORD }}
      PROTONMAIL_SESSION_JSON: ${{ secrets.PROTONMAIL_SESSION_JSON }}
      PROTONMAIL_SESSION_CACHE_KEY: ${{ secrets.PROTONMAIL_SESSION_CACHE_KEY }}
      PROTONMAIL_LIVE_SESSION_FILE: .ci-proton/session.json
      PROTONMAIL_LIVE_TEST: "1"
      PROTONMAIL_LIVE_HEADLESS: "1"
      PROTONMAIL_ALLOW_FRESH_LOGIN: ${{ github.event_name == 'workflow_dispatch' && inputs.allow_fresh_login && '1' || '0' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Compute branch session cache key
        id: session-key
        shell: bash
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import os
          import re
          import time

          branch = os.environ.get("GITHUB_HEAD_REF") or os.environ.get("GITHUB_REF_NAME") or "unknown"
          slug = re.sub(r"[^A-Za-z0-9_.-]+", "-", branch).strip("-")[:80] or "unknown"
          bucket = int(time.time() // (6 * 60 * 60))
          print(f"branch={slug}")
          print(f"bucket={bucket}")
          PY

      - name: Restore encrypted branch session cache
        id: restore-session
        uses: actions/cache/restore@v4
        with:
          path: .ci-proton/session.enc
          key: proton-session-${{ steps.session-key.outputs.branch }}-${{ steps.session-key.outputs.bucket }}

      - name: Prepare live session
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .ci-proton

          if [[ -f .ci-proton/session.enc ]]; then
            if [[ -z "${PROTONMAIL_SESSION_CACHE_KEY}" ]]; then
              echo "Encrypted session cache exists, but PROTONMAIL_SESSION_CACHE_KEY is missing." >&2
              exit 1
            fi
            pnpm session:cache -- decrypt --input .ci-proton/session.enc --output "${PROTONMAIL_LIVE_SESSION_FILE}"
            {
              printf 'PROTONMAIL_SESSION_JSON<<EOF\n'
              cat "${PROTONMAIL_LIVE_SESSION_FILE}"
              printf '\nEOF\n'
            } >> "$GITHUB_ENV"
            exit 0
          fi

          if [[ -n "${PROTONMAIL_SESSION_JSON}" ]]; then
            printf '%s' "${PROTONMAIL_SESSION_JSON}" > "${PROTONMAIL_LIVE_SESSION_FILE}"
            chmod 600 "${PROTONMAIL_LIVE_SESSION_FILE}"
            exit 0
          fi

          if [[ "${PROTONMAIL_ALLOW_FRESH_LOGIN}" == "1" ]]; then
            exit 0
          fi

          echo "Missing branch session cache and PROTONMAIL_SESSION_JSON. PR/scheduled CI requires a cached or seeded keep-logged-in session." >&2
          exit 1

      - name: Verify live credentials are configured
        shell: bash
        run: |
          if [[ -n "${PROTONMAIL_SESSION_JSON}" ]]; then
            exit 0
          fi
          if [[ "${PROTONMAIL_ALLOW_FRESH_LOGIN}" != "1" ]]; then
            echo "Missing PROTONMAIL_SESSION_JSON. Scheduled CI intentionally avoids fresh Proton credential login." >&2
            echo "Capture a keep-logged-in session and store it as PROTONMAIL_SESSION_JSON, or manually dispatch with allow_fresh_login=true." >&2
            exit 1
          fi
          if [[ -z "${PROTONMAIL_USERNAME}" || -z "${PROTONMAIL_PASSWORD}" ]]; then
            echo "Fresh login was explicitly allowed, but PROTONMAIL_USERNAME or PROTONMAIL_PASSWORD is missing." >&2
            exit 1
          fi

      - name: Run live Proton login regression
        run: pnpm test:live

      - name: Encrypt refreshed branch session
        if: success() && env.PROTONMAIL_SESSION_CACHE_KEY != ''
        run: pnpm session:cache -- encrypt --input "${PROTONMAIL_LIVE_SESSION_FILE}" --output .ci-proton/session.enc

      - name: Save 6-hour branch session cache
        if: success() && steps.restore-session.outputs.cache-hit != 'true' && env.PROTONMAIL_SESSION_CACHE_KEY != ''
        uses: actions/cache/save@v4
        with:
          path: .ci-proton/session.enc
          key: proton-session-${{ steps.session-key.outputs.branch }}-${{ steps.session-key.outputs.bucket }}
