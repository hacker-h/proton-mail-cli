name: Live Proton Regression

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  workflow_dispatch:
    inputs:
      allow_fresh_login:
        description: "Allow credential login if PROTONMAIL_SESSION_JSON is missing or expired"
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "17 5 * * *"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: live-proton-regression-${{ github.event.pull_request.head.ref || github.ref_name }}
  cancel-in-progress: false

jobs:
  login:
    name: Proton login and session reuse
    if: >
      github.event_name == 'schedule' ||
      (github.event_name == 'push' && github.actor == github.repository_owner) ||
      (github.event_name == 'workflow_dispatch' && github.actor == github.repository_owner) ||
      (github.event_name == 'pull_request' &&
        github.event.pull_request.head.repo.full_name == github.repository &&
        (github.actor == github.repository_owner ||
          github.actor == 'dependabot[bot]' ||
          github.event.pull_request.user.login == github.repository_owner ||
          github.event.pull_request.user.login == 'dependabot[bot]'))
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PROTONMAIL_LIVE_SESSION_FILE: .ci-proton/session.json
      PROTONMAIL_LIVE_TEST: "1"
      PROTONMAIL_LIVE_HEADLESS: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 9.15.9

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Compute branch session cache key
        id: session-key
        shell: bash
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import os
          import re
          import time

          branch = os.environ.get("GITHUB_HEAD_REF") or os.environ.get("GITHUB_REF_NAME") or "unknown"
          slug = re.sub(r"[^A-Za-z0-9_.-]+", "-", branch).strip("-")[:80] or "unknown"
          bucket = int(time.time() // (6 * 60 * 60))
          print(f"branch={slug}")
          print(f"bucket={bucket}")
          PY

      - name: Decide trusted secret policy
        id: secret-policy
        env:
          EVENT_NAME: ${{ github.event_name }}
          ACTOR: ${{ github.actor }}
          REPOSITORY_OWNER: ${{ github.repository_owner }}
          REPOSITORY: ${{ github.repository }}
          PR_HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name || '' }}
          PR_USER: ${{ github.event.pull_request.user.login || '' }}
          DISPATCH_ALLOW_FRESH_LOGIN: ${{ github.event_name == 'workflow_dispatch' && inputs.allow_fresh_login && '1' || '0' }}
        run: node scripts/live-secret-policy.mjs >> "${GITHUB_OUTPUT}"

      - name: Restore encrypted branch session cache
        id: restore-session
        uses: actions/cache/restore@v5
        with:
          path: .ci-proton/session.enc
          key: proton-session-${{ steps.session-key.outputs.branch }}-${{ steps.session-key.outputs.bucket }}
          restore-keys: |
            proton-session-${{ steps.session-key.outputs.branch }}-

      - name: Prepare live session
        shell: bash
        env:
          PROTONMAIL_SESSION_JSON: ${{ secrets.PROTONMAIL_SESSION_JSON }}
          PROTONMAIL_SESSION_CACHE_KEY: ${{ secrets.PROTONMAIL_SESSION_CACHE_KEY }}
          PROTONMAIL_ALLOW_FRESH_LOGIN: ${{ steps.secret-policy.outputs.allow_fresh_login }}
        run: node scripts/prepare-live-session.mjs --encrypted-cache .ci-proton/session.enc --output "${PROTONMAIL_LIVE_SESSION_FILE}"

      - name: Verify live credentials are configured
        shell: bash
        env:
          PROTONMAIL_USERNAME: ${{ steps.secret-policy.outputs.allow_fresh_login == '1' && secrets.PROTONMAIL_USERNAME || '' }}
          PROTONMAIL_PASSWORD: ${{ steps.secret-policy.outputs.allow_fresh_login == '1' && secrets.PROTONMAIL_PASSWORD || '' }}
          PROTONMAIL_SESSION_JSON: ${{ secrets.PROTONMAIL_SESSION_JSON }}
          PROTONMAIL_ALLOW_FRESH_LOGIN: ${{ steps.secret-policy.outputs.allow_fresh_login }}
          PROTONMAIL_USERNAME2: ${{ steps.secret-policy.outputs.allow_fresh_login == '1' && secrets.PROTONMAIL_USERNAME2 || '' }}
          PROTONMAIL_PASSWORD2: ${{ steps.secret-policy.outputs.allow_fresh_login == '1' && secrets.PROTONMAIL_PASSWORD2 || '' }}
        run: |
          if [[ -f "${PROTONMAIL_LIVE_SESSION_FILE}" ]]; then
            exit 0
          fi
          if [[ -n "${PROTONMAIL_SESSION_JSON}" ]]; then
            exit 0
          fi
          if [[ "${PROTONMAIL_ALLOW_FRESH_LOGIN}" != "1" ]]; then
            echo "Missing PROTONMAIL_SESSION_JSON and this event is not allowed to use Proton credentials." >&2
            exit 1
          fi
          if [[ -z "${PROTONMAIL_USERNAME}" || -z "${PROTONMAIL_PASSWORD}" ]]; then
            echo "Fresh login was explicitly allowed, but PROTONMAIL_USERNAME or PROTONMAIL_PASSWORD is missing." >&2
            exit 1
          fi
          if [[ -z "${PROTONMAIL_USERNAME2}" || -z "${PROTONMAIL_PASSWORD2}" ]]; then
            echo "Fresh login was explicitly allowed, but PROTONMAIL_USERNAME2 or PROTONMAIL_PASSWORD2 is missing." >&2
            exit 1
          fi

      - name: Verify saved session or refresh with live credentials
        id: live-tests
        shell: bash
        env:
          PROTONMAIL_USERNAME: ${{ steps.secret-policy.outputs.allow_fresh_login == '1' && secrets.PROTONMAIL_USERNAME || '' }}
          PROTONMAIL_PASSWORD: ${{ steps.secret-policy.outputs.allow_fresh_login == '1' && secrets.PROTONMAIL_PASSWORD || '' }}
          PROTONMAIL_USERNAME2: ${{ steps.secret-policy.outputs.allow_fresh_login == '1' && secrets.PROTONMAIL_USERNAME2 || '' }}
          PROTONMAIL_PASSWORD2: ${{ steps.secret-policy.outputs.allow_fresh_login == '1' && secrets.PROTONMAIL_PASSWORD2 || '' }}
          PROTONMAIL_ALLOW_FRESH_LOGIN: ${{ steps.secret-policy.outputs.allow_fresh_login }}
        run: |
          set -o pipefail
          pnpm test:live 2>&1 | tee .ci-proton/live-test.log

      - name: Summarize live session outcome
        if: always()
        env:
          EVENT_NAME: ${{ github.event_name }}
          LIVE_TEST_OUTCOME: ${{ steps.live-tests.outcome || 'skipped' }}
          ALLOW_FRESH_LOGIN: ${{ steps.secret-policy.outputs.allow_fresh_login }}
          HAS_SESSION_JSON: ${{ secrets.PROTONMAIL_SESSION_JSON != '' && '1' || '0' }}
          HAS_SESSION_CACHE: ${{ steps.restore-session.outputs.cache-hit == 'true' && '1' || '0' }}
          HAS_SESSION_CACHE_KEY: ${{ secrets.PROTONMAIL_SESSION_CACHE_KEY != '' && '1' || '0' }}
          HAS_PRIMARY_CREDENTIALS: ${{ steps.secret-policy.outputs.allow_fresh_login == '1' && secrets.PROTONMAIL_USERNAME != '' && secrets.PROTONMAIL_PASSWORD != '' && '1' || '0' }}
          HAS_SECONDARY_CREDENTIALS: ${{ steps.secret-policy.outputs.allow_fresh_login == '1' && secrets.PROTONMAIL_USERNAME2 != '' && secrets.PROTONMAIL_PASSWORD2 != '' && '1' || '0' }}
          LIVE_TEST_LOG: .ci-proton/live-test.log
        run: node scripts/live-session-diagnostics.mjs >> "${GITHUB_STEP_SUMMARY}"

      - name: Encrypt refreshed branch session
        if: steps.live-tests.outcome == 'success'
        env:
          PROTONMAIL_SESSION_CACHE_KEY: ${{ secrets.PROTONMAIL_SESSION_CACHE_KEY }}
        run: |
          if [[ -z "${PROTONMAIL_SESSION_CACHE_KEY}" ]]; then
            echo "PROTONMAIL_SESSION_CACHE_KEY is not configured; skipping session cache save."
            exit 0
          fi
          pnpm session:cache -- encrypt --input "${PROTONMAIL_LIVE_SESSION_FILE}" --output .ci-proton/session.enc

      - name: Save 6-hour branch session cache
        if: steps.live-tests.outcome == 'success' && steps.restore-session.outputs.cache-hit != 'true' && hashFiles('.ci-proton/session.enc') != ''
        uses: actions/cache/save@v5
        with:
          path: .ci-proton/session.enc
          key: proton-session-${{ steps.session-key.outputs.branch }}-${{ steps.session-key.outputs.bucket }}
